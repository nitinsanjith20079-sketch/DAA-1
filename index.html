<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interpolation Search Visualizer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:650px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:25px;
    background:#f5f5f5;
    padding:20px;
    border-radius:10px;
}

.result p{
    margin:10px 0;
    font-size:17px;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Interpolation Search</h1>

<label>Sorted Array (comma separated)</label>
<input type="text" id="array"
placeholder="2,5,10,15,23,35,48,60">

<label>Target Element</label>
<input type="number" id="target" placeholder="35">

<button onclick="search()">Search</button>

<div class="result" id="output">

<p>Enter a sorted array and click Search.</p>

</div>

</div>

<script>

function interpolationSearch(arr,target){

let low=0;
let high=arr.length-1;
let comparisons=0;

while(low<=high && target>=arr[low] && target<=arr[high]){

comparisons++;

if(low===high){

if(arr[low]===target)
return {index:low,comparisons};

break;

}

let pos=low+Math.floor(
((target-arr[low])*(high-low))/
(arr[high]-arr[low])
);

if(arr[pos]===target)
return {index:pos,comparisons};

if(arr[pos]<target)
low=pos+1;
else
high=pos-1;

}

return {index:-1,comparisons};

}

function search(){

let array=document.getElementById("array").value;

let arr=array.split(",")
.map(x=>Number(x.trim()))
.filter(x=>!isNaN(x));

let target=Number(document.getElementById("target").value);

if(arr.length===0){

alert("Please enter a valid array.");
return;

}

let start=performance.now();

let result=interpolationSearch(arr,target);

let end=performance.now();

let output=document.getElementById("output");

if(result.index!=-1){

output.innerHTML=`
<p class="success">✔️ Element Found</p>

<p><b>Index :</b> ${result.index}</p>

<p><b>Comparisons :</b> ${result.comparisons}</p>

<p><b>Execution Time :</b> ${(end-start).toFixed(5)} ms</p>
`;

}

else{

output.innerHTML=`
<p class="error">✖️ Element Not Found</p>

<p><b>Comparisons :</b> ${result.comparisons}</p>

<p><b>Execution Time :</b> ${(end-start).toFixed(5)} ms</p>
`;

}

}

</script>

</body>
</html>
